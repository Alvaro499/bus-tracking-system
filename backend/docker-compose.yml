# ============================================================================
# DOCKER COMPOSE: DESARROLLO SOLAMENTE
# ============================================================================
# Use this file for LOCAL development
# 
# QUICK START:
#   docker-compose up -d
#
# FOR TESTING:
#   docker-compose -f docker-compose.test.yml up -d
#
# VIEW LOGS:
#   docker-compose logs -f postgres-dev
#
# STOP CONTAINERS:
#   docker-compose down
# ============================================================================

version: '3.8'

services:
  # ========================================================================
  # POSTGRES DEVELOPMENT
  # ========================================================================
  postgres-dev:
    image: postgres:16-alpine
    container_name: bustracking-postgres-db-dev
    
    # Environment variables (read from .env)
    env_file:
      - .env
    
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    # Exposed ports (host:container)
    ports:
      - "${POSTGRES_HOST_PORT}:${POSTGRES_INTERNAL_PORT}"
    
    # Volume: Persist data on disk
    volumes:
      # Datos de la BD
      - postgres_dev_data:/var/lib/postgresql/data
    
    # Red privada entre contenedores
    networks:
      - bustracking-network
    
    # Health check (opcional pero recomendado)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  redis:
      image: redis:8-alpine
      container_name: bustracking-redis-dev
      env_file:
        - .env
      ports:
        - "${REDIS_HOST_PORT}:6379"
      command: redis-server --requirepass ${REDIS_PASSWORD}
      networks:
        - bustracking-network



# ============================================================================
# VOLÚMENES (almacenamiento persistente)
# ============================================================================
volumes:
  postgres_dev_data:
    driver: local

# ============================================================================
# REDES (comunicación entre contenedores)
# ============================================================================
networks:
  bustracking-network:
    driver: bridge