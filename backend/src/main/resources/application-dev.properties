# ============================================================================
# APPLICATION PROPERTIES: DEVELOPMENT PROFILE
# ============================================================================
# Activo con: mvn clean spring-boot:run
# O: mvn clean spring-boot:run -P dev (explícito, pero dev es default)

spring.application.name=backend
server.port=8081

# ============================================================================
# DATASOURCE (Local Development - Docker)
# ============================================================================
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_HOST_PORT}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================================
# HIBERNATE (Development - validate schema, do not auto-create)
# In order to verify that Hibernate entities match the actual database schema
spring.jpa.hibernate.ddl-auto=validate

# ============================================================================
# SQL INITIALIZATION (Development - Load test data at startup always)
# ============================================================================
spring.sql.init.mode=always
spring.sql.init.platform=postgresql
spring.sql.init.data-locations=classpath:db/data-dev.sql

# ============================================================================
# LOGGING SQL (debugging)
# ============================================================================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================================
# LOGGING (Verboso para debugging)
# ============================================================================
logging.level.root=INFO
logging.level.com.bustracking=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.boot.autoconfigure=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================================================
# DEVTOOLS (Auto-reload en cambios de código)
# ============================================================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# ============================================================================
# ERROR HANDLING (Dev-friendly)
# ============================================================================
server.error.include-stacktrace=always
server.error.include-binding-errors=always
server.error.include-message=always
server.error.include-exception=true

# ============================================================================
# SWAGGER (Development - Always enabled for API exploration)
# ============================================================================
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs