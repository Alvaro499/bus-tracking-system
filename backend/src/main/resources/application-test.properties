# ============================================================================
# APPLICATION PROPERTIES: TESTING PROFILE
# ============================================================================
# Active when running: mvn test
# TestContainers automatically provides database connection
# Spring creates/destroys schema with ddl-auto=create-drop

spring.application.name=backend

# ============================================================================
# DATABASE (TestContainers provider)
# ============================================================================
# NOTE: Values are overridden by @DynamicPropertySource in integration tests
spring.datasource.url=jdbc:postgresql://localhost:5433/bustracking_test
spring.datasource.username=bustracking_test_user
spring.datasource.password=test_password_123
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================================
# HIBERNATE (Testing)
# ============================================================================
# create-drop: Creates tables before test, drops after (clean state per test)
spring.jpa.hibernate.ddl-auto=create-drop

# ============================================================================
# LOGGING (Quiet during tests)
# ============================================================================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.root=WARN
logging.level.com.bustracking=INFO
