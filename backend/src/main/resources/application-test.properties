# ============================================================================
# APPLICATION PROPERTIES: TESTING PROFILE
# ============================================================================
# Active when running: mvn test
# TestContainers automatically provides database connection
# Spring creates/destroys schema with ddl-auto=create-drop

spring.application.name=backend

# ============================================================================
# HIBERNATE (Testing)
# ============================================================================
# create-drop: Creates tables before test, drops after (clean state per test)
spring.jpa.hibernate.ddl-auto=create-drop

# ============================================================================
# LOGGING (Simple logs during tests)
# ============================================================================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.root=WARN
logging.level.com.bustracking=INFO
