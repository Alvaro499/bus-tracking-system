# ============================================================================
# APPLICATION PROPERTIES: TESTING PROFILE
# ============================================================================
# Active when: mvn test
# TestContainers: create using init.sql and spin up an ephemeral PostgreSQL per test class, injecting connection variables dynamically.

spring.application.name=backend

# ============================================================================
# DATASOURCE (Test - TestContainers)
# ============================================================================
# ⚠️ IMPORTANT: TestContainers OVERRIDES these values automatically at runtime
# - @DynamicPropertySource in RepositoryIntegrationTest.java injects actual container values
# - These placeholders are FALLBACK DEFAULTS ONLY (never used in practice)
# - TestContainers:
#   1. Spins up a real PostgreSQL 16-alpine Docker container
#   2. Extracts actual JDBC URL, username, password from the running container
#   3. Injects them dynamically via @DynamicPropertyRegistry
#   4. Spring resolves placeholders with injected values (overriding defaults below)
# 
# DO NOT modify these values manually - TestContainers handles everything
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST_TEST:localhost}:${POSTGRES_PORT_TEST:5433}/${POSTGRES_DB_TEST:bus_tracking_test}
spring.datasource.username=${POSTGRES_USER_TEST:bus_test_user}
spring.datasource.password=${POSTGRES_PASSWORD_TEST:test_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================================
# HIBERNATE (Testing - schema managed by SQL files, not Hibernate)
# ============================================================================
# ddl-auto=none: Hibernate do not create/validate tables
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ============================================================================
# SQL INITIALIZATION (Schema from init-test.sql, Data from @Sql fixtures in testing classes)
# ============================================================================
# schema-locations: Creates the schema (CREATE TABLE)
# data-locations: empty (we use @Sql in testing classes for fixtures)
spring.sql.init.mode=always
spring.sql.init-platform=postgresql
spring.sql.init.schema-locations=classpath:db/test-init.sql
spring.sql.init.data-locations=

# ============================================================================
# LOGGING (Minimal during tests)
# ============================================================================
logging.level.root=WARN
logging.level.com.bustracking=INFO

# ============================================================================
# SWAGGER (Test - Enabled for e2e/functional tests)
# ============================================================================
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
