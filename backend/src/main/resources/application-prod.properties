# ============================================================================
# APPLICATION PROPERTIES: PRODUCTION PROFILE
# ============================================================================
# Activo con: mvn clean install -P prod
# O durante deploy: SPRING_PROFILES_ACTIVE=prod

spring.application.name=backend
server.port=8081

# ============================================================================
# DATASOURCE (Production - Environment Variables REQUERIDAS)
# ============================================================================
# DEBEN estar configuradas en el servidor de deploy (Render, Railway, etc)
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST_PROD}:${POSTGRES_PORT_PROD}/${POSTGRES_DB_PROD}
spring.datasource.username=${POSTGRES_USER_PROD}
spring.datasource.password=${POSTGRES_PASSWORD_PROD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pooling for production
#spring.datasource.hikari.maximum-pool-size=10
#spring.datasource.hikari.minimum-idle=2
#spring.datasource.hikari.connection-timeout=30000
#spring.datasource.hikari.idle-timeout=600000
#spring.datasource.hikari.max-lifetime=1800000

# ============================================================================
# HIBERNATE (Production - Read Only, Strict Validation)
# ============================================================================
# validate: SOLO valida que el schema coincida, NO altera nada
# Si hay diferencia → app NO inicia (fail-fast)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.open-in-view=false

# ============================================================================
# LOGGING (Minimal - Solo errores y warnings)
# ============================================================================
logging.level.root=WARN
logging.level.com.bustracking=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ============================================================================
# PERFORMANCE & SECURITY
# ============================================================================
server.error.include-stacktrace=never
server.error.include-binding-errors=never
server.error.include-message=never
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.excluded-mime-types=

# ============================================================================
# SWAGGER (Disabled in production for security)
# ============================================================================
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false