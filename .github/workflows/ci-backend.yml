name: CI Pipeline - Bus Tracking

# ============================================================
# TRIGGER EVENTS
# Only triggers when something inside /backend changes.
# Changes to docs, frontend, or bus-app will not run this pipeline.
# ============================================================
on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'

# All jobs run from the /backend folder of the monorepo
defaults:
  run:
    working-directory: backend

jobs:

  # ============================================================
  # JOB 1: FAST TESTS (Unit + Controller)
  # No DB, no Docker. Runs in ~30-60 seconds.
  # Runs on every push and PR.
  # ============================================================
  core-tests:
    name: Core Tests (Unit, Controller, Shared Integration)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Each job runs on a brand new server, so Java must be
      # configured from scratch every time in every job.
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Grant execute permission for Maven Wrapper
        run: chmod +x ./mvnw
        
      # Unit Tests: domain, use cases, value objects, delegates
      - name: Execute Unit Tests
        run: ./mvnw test -B -Dtest="**/unit/**" -DfailIfNoTests=false

      # Controller Tests (@WebMvcTest) – no database needed
      - name: Execute Controller Tests
        run: ./mvnw test -B -Dtest="**/integration/controller/**" -DfailIfNoTests=false

      # Shared Integration Tests (SecurityConfigTest, etc.)
      - name: Execute Shared Integration Tests
        run: ./mvnw test -B -Dtest="**/shared/integration/**" -DfailIfNoTests=false

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: core-test-reports
          path: backend/target/surefire-reports/


  # ============================================================
  # JOB 2: INTEGRATION TESTS (Repository + Flow)
  # Utiliza Testcontainers con PostgreSQL y Redis reales en Docker.
  # Requiere que el Job 1 pase correctamente.
  # ============================================================
  integration-tests:
    name: Integration Tests (Repository + E2E)
    runs-on: ubuntu-latest
    needs: core-tests

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Fresh server again - Java setup required
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Grant execute permission for Maven Wrapper
        run: chmod +x ./mvnw

      # Repository Tests: @DataJpaTest with Testcontainers PostgreSQL
      - name: Execute Repository Tests
        run: ./mvnw test -B -Dtest="**/integration/repository/**" -DfailIfNoTests=false

      # Flow Tests: @SpringBootTest with Testcontainers (PostgreSQL + Redis)
      - name: Execute Flow Integration Tests
        run: ./mvnw test -B -Dtest="**/integration/flow/**" -DfailIfNoTests=false

      - name: Upload integration test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-reports
          path: backend/target/surefire-reports/


  # ============================================================
  # JOB 3: BUILD DOCKER IMAGE
  # Compiles production artifacts and builds the Docker image.
  # Requires all previous test jobs to pass.
  # ============================================================
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [ core-tests, integration-tests ]

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Fresh server again - Java setup required
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Grant execute permission for Maven Wrapper
        run: chmod +x ./mvnw

      # Generate production JAR skipping tests (already verified in Jobs 1 and 2)
      - name: Package production JAR
        run: ./mvnw clean package -B -DskipTests -q

      - name: Build Docker image
        run: docker build -t bustracking-backend:${{ github.sha }} .

      # Smoke test to ensure the container starts correctly
      - name: Verify container startup
        run: |
          docker run --rm -d \
            --name bustracking-test \
            -e SPRING_PROFILES_ACTIVE=test \
            -p 8080:8080 \
            bustracking-backend:${{ github.sha }}
          sleep 10
          docker stop bustracking-test || true

