name: CI Pipeline - Bus Tracking

# ============================================================
# TRIGGER EVENTS
# Only triggers when something inside /backend changes.
# Changes to docs, frontend, or bus-app will not run this pipeline.
# ============================================================
on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'

# All jobs run from the /backend folder of the monorepo
defaults:
  run:
    working-directory: backend

jobs:

  # ============================================================
  # JOB 1: FAST TESTS (Unit + Controller)
  # No DB, no Docker. Runs in ~30-60 seconds.
  # Runs on every push and PR.
  # ============================================================
  fast-tests:
    name: Fast Tests (Unit + Controller)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Each job runs on a brand new server, so Java must be
      # configured from scratch every time in every job.
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Grant execute permission for Maven Wrapper
        run: chmod +x ./mvnw

      - name: Compile project
        run: ./mvnw clean compile -B -q

      # Run only unit tests (domain + usecase) - no database required
      - name: Execute Unit Tests (Domain + UseCase)
        run: ./mvnw test -B -Dtest="**/unit/**" -DfailIfNoTests=false

      # Run only controller tests (@WebMvcTest) - no database required
      - name: Execute Controller Tests (WebMvcTest)
        run: ./mvnw test -B -Dtest="**/integration/controller/**" -DfailIfNoTests=false

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fast-test-reports
          path: backend/target/surefire-reports/


  # ============================================================
  # JOB 2: INTEGRATION TESTS (Repository + E2E)
  # Uses TestContainers with real PostgreSQL in Docker.
  # Runs in ~5-15 minutes. Requires Job 1 to pass.
  # ============================================================
  integration-tests:
    name: Integration Tests (Repository + E2E)
    runs-on: ubuntu-latest
    needs: fast-tests

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Fresh server again - Java setup required
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Grant execute permission for Maven Wrapper
        run: chmod +x ./mvnw

      # ubuntu-latest already has Docker installed.
      # TestContainers detects it automatically and starts PostgreSQL.
      - name: Execute Repository Tests (TestContainers + PostgreSQL)
        run: ./mvnw test -B -Dtest="**/integration/repository/**" -DfailIfNoTests=false

      - name: Execute E2E Tests
        run: ./mvnw test -B -Dtest="**/e2e/**" -DfailIfNoTests=false

      - name: Upload integration test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-reports
          path: backend/target/surefire-reports/


  # ============================================================
  # JOB 3: BUILD DOCKER IMAGE
  # Compiles production artifacts and builds the Docker image.
  # Requires all previous test jobs to pass.
  #
  # NOTE: If you don't use Docker, delete this entire job and
  # remove 'integration-tests' from the needs list above.
  # ============================================================
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [ fast-tests, integration-tests ]

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Fresh server again - Java setup required
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Grant execute permission for Maven Wrapper
        run: chmod +x ./mvnw

      # Generate production JAR skipping tests (already verified in Jobs 1 and 2)
      - name: Package production JAR
        run: ./mvnw clean package -B -DskipTests -q

      - name: Build Docker image
        run: docker build -t bustracking-backend:${{ github.sha }} .

      # Smoke test to ensure the container starts correctly
      - name: Verify container startup
        run: |
          docker run --rm -d \
            --name bustracking-test \
            -e SPRING_PROFILES_ACTIVE=test \
            -p 8080:8080 \
            bustracking-backend:${{ github.sha }}
          sleep 10
          docker stop bustracking-test || true

